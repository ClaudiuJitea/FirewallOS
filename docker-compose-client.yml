services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: firewall-client

    cap_add:
      - NET_ADMIN
      - NET_RAW
    stdin_open: true
    tty: true
    command: [ "/opt/fw-tests/entrypoint.sh" ]
    networks:
      lan: {}
    restart: "no"

networks:
  lan:
    external: true
    name: firewall_lan
