services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - firewall_data:/app/data
    cap_add:
      - NET_ADMIN
      - NET_RAW
    init: true
    networks:
      default:
        interface_name: eth0
        gw_priority: 1
      lan:
        interface_name: eth1
        gw_priority: 0
    restart: always

volumes:
  firewall_data:

networks:
  lan:
    name: firewall_lan
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
          gateway: 10.0.0.254
